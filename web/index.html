<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="description"
      content="pyverdex — multi-dimensional test verification for Python. Beyond line coverage: branch, function-to-function edges, mutation kill-rate, and assertion quality, as a deterministic LangGraph pipeline."
    />
    <meta name="theme-color" content="#dcd8cc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#08090b" media="(prefers-color-scheme: dark)" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Set the theme before first paint so there is no flash of the wrong palette.
         localStorage wins; otherwise honour the OS preference; default light. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("pyverdex-theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <title>pyverdex — multi-dimensional test verification</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
